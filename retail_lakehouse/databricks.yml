# This is a Databricks asset bundle definition for retail_lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retail_lakehouse
  uuid: d490e904-ca50-4554-9662-d6a5427701f3

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  bronze_schema:
    description: Bronze layer schema
    default: bronze
  silver_schema:
    description: Silver layer schema
    default: silver
  gold_schema:
    description: Gold layer schema
    default: gold

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    variables:
      catalog: retail_lakehouse
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      # We explicitly deploy to /Workspace/Users/sharoncheers@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sharoncheers@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: retail_lakehouse
    permissions:
      - user_name: sharoncheers@gmail.com
        level: CAN_MANAGE
